name: Bug report
description: Something broke in @meshtest/cli or @meshtest/server.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much as you can — every empty field is one round-trip of back-and-forth.

        **Before filing:**
        - Run `npm view @meshtest/cli version` and confirm you're on the latest
        - [Search existing issues](https://github.com/developerKumar/meshtest-issues-tracker/issues?q=is%3Aissue) — open and closed

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which npm package is affected?
      options:
        - "@meshtest/cli"
        - "@meshtest/server"
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `meshtest --version` (CLI) or `meshtest-server --version` (server).
      placeholder: "0.4.2"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - WSL
        - Other (specify in reproduction)
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - "npm install -g (global)"
        - "npx (on-demand)"
        - "project-local devDependency"
        - Other (specify in reproduction)
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: In one or two sentences, what should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include exit codes if relevant.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        The exact command(s) you ran plus a minimal manifest / config that
        triggers the bug. Under 20 lines of YAML if you can. Please paste as
        text — not screenshots.
      render: shell
      placeholder: |
        # command
        meshtest run --env staging

        # minimal meshtest.yaml
        service:
          name: petstore
          base_url: https://api.petstore.example.com
        tests:
          - suite: smoke
            tests:
              - name: list pets
                method: GET
                path: /pets
                expect: { status: 200 }
    validations:
      required: true

  - type: textarea
    id: stderr
    attributes:
      label: Error output (stderr)
      description: Copy the full error output. Paste as text — not a screenshot.
      render: shell
    validations:
      required: false

  - type: textarea
    id: telemetry-debug
    attributes:
      label: MESHTEST_TELEMETRY_DEBUG=1 output (optional)
      description: |
        Only relevant if the bug is telemetry-related. Set the env var and
        re-run — the outgoing PostHog payload will be printed to stderr.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Screenshots, related issues, workarounds you tried, etc.
    validations:
      required: false
